            - text: →
            - strong [ref=e188]: Events
            - text: "tab:"
          - code [ref=e190]: "AgentRegistered agentId (token ID): 0 operatorWallet: 0xYourOperatorAddress agentWallet: 0xYourAgentWalletAddress name: AITradingAgent"
          - paragraph [ref=e191]:
            - text: You can also check the
            - strong [ref=e192]:
              - link "ERC-721 Transfers" [ref=e193] [cursor=pointer]:
                - /url: https://sepolia.etherscan.io
            - text: tab, you'll see the mint event transferring token ID
