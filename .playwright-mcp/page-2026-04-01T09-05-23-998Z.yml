            - text: from the zero address to your wallet.
          - separator [ref=e195]
          - heading "Why on-chain agent identity matters" [level=2] [ref=e196]
          - heading "1. The identity layer is already built" [level=3] [ref=e197]
          - paragraph [ref=e198]: By using ERC-8004, every team's agent automatically gets a verifiable identity without having to invent their own scheme. The registry is the shared ground truth.
          - heading "2. Reputation becomes composable" [level=3] [ref=e199]
          - paragraph [ref=e200]:
            - text: Because
            - code [ref=e201]: "`agentId`"
            - text: is persistent and tied to on-chain activity, every trade, every checkpoint, every vault interaction is linked to that identity. Future systems could build reputation scores, whitelists, or risk tiers on top of this.
          - heading "3. The scaffolding stays the same" [level=3] [ref=e202]
          - paragraph [ref=e203]: "This is the \"reusable template\" angle: the identity, reputation system, and validation scaffolding (ERC-8004 → Vault → RiskRouter → EIP-712) stay constant across teams. What changes is the strategy inside. Your agent's identity doesn't care if you're running a momentum strategy, an LLM, or a neural network."
          - separator [ref=e204]
          - heading "The AgentRegistry contract" [level=2] [ref=e205]
          - paragraph [ref=e206]:
            - text: Here's the core registration function (
            - 'link "`contracts/AgentRegistry.sol` L92–L120" [ref=e207] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/contracts/AgentRegistry.sol#L92-L120
              - code [ref=e208]: "`contracts/AgentRegistry.sol`"
              - text: L92–L120
            - text: "):"
          - code [ref=e210]: "function register( address agentWallet, string calldata name, string calldata description, string[] calldata capabilities, string calldata agentURI ) external returns (uint256 agentId) { require(bytes(name).length > 0, \"AgentRegistry: name required\"); require(agentWallet != address(0), \"AgentRegistry: invalid agentWallet\"); agentId = _nextAgentId++; _mint(msg.sender, agentId); // ERC-721 mint _setTokenURI(agentId, agentURI); agents[agentId] = AgentRegistration({ operatorWallet: msg.sender, agentWallet: agentWallet, name: name, description: description, capabilities: capabilities, registeredAt: block.timestamp, active: true }); walletToAgentId[agentWallet] = agentId; emit AgentRegistered(agentId, msg.sender, agentWallet, name); }"
          - paragraph [ref=e211]: "Key properties:"
          - list [ref=e212]:
            - listitem [ref=e213]:
              - strong [ref=e214]: Mints an ERC-721 token
              - text: ": your agent identity is a transferable NFT"
            - listitem [ref=e215]:
              - strong [ref=e216]: Two wallet roles
              - text: ":"
              - code [ref=e217]: "`operatorWallet`"
              - text: (owns the token) and
              - code [ref=e218]: "`agentWallet`"
              - text: (signs trades at runtime)
            - listitem [ref=e219]:
              - strong [ref=e220]: Auto-incrementing agentId
              - text: ": starts at 0, stable and unique forever"
            - listitem [ref=e221]:
              - strong [ref=e222]: Emits an event
              - text: ":"
              - code [ref=e223]: "`AgentRegistered(agentId, operatorWallet, agentWallet, name)`"
              - text: — queryable on Etherscan
          - separator [ref=e224]
          - 'heading "Part 2: Registering Your Agent On-Chain (ERC-721)" [level=2] [ref=e225]'
          - heading "Why ERC-721?" [level=2] [ref=e226]
          - paragraph [ref=e227]: "Your agent's identity is an NFT. This means:"
          - list [ref=e228]:
            - listitem [ref=e229]:
              - strong [ref=e230]: agentId
              - text: is a
              - code [ref=e231]: "`uint256`"
              - text: token ID, stable, unique, gas-efficient to store
            - listitem [ref=e232]:
              - text: The token is
              - strong [ref=e233]: transferable
              - text: ": sell a well-performing agent along with its on-chain reputation"
            - listitem [ref=e234]: Standard ERC-721 interfaces mean wallets, marketplaces, and indexers understand it natively
            - listitem [ref=e235]: Token URI points to your Agent Registration JSON (metadata about capabilities and endpoints)
          - separator [ref=e236]
          - heading "What the registration looks like under the hood" [level=2] [ref=e237]
          - paragraph [ref=e238]:
            - 'link "`scripts/register-agent.ts` L47" [ref=e239] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/scripts/register-agent.ts#L47
              - code [ref=e240]: "`scripts/register-agent.ts`"
              - text: L47
            - text: calls
            - 'link "`src/agent/identity.ts` L46–L68" [ref=e241] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/agent/identity.ts#L46-L68
              - code [ref=e242]: "`src/agent/identity.ts`"
              - text: L46–L68
            - text: ":"
          - code [ref=e244]: "const agentId = await getAgentId(operatorSigner, registryAddress, { name: \"AITradingAgent\", agentWallet: agentWallet.address, capabilities: [\"trading\", \"analysis\", \"eip712-signing\"], agentURI: \"ipfs://...\", // or data URI ... });"
          - paragraph [ref=e245]:
            - text: Which calls
            - code [ref=e246]: "`register()`"
            - text: on the contract (
            - 'link "`contracts/AgentRegistry.sol` L92–L120" [ref=e247] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/contracts/AgentRegistry.sol#L92-L120
              - code [ref=e248]: "`contracts/AgentRegistry.sol`"
              - text: L92–L120
            - text: "):"
          - code [ref=e250]: "function register( address agentWallet, string calldata name, string calldata description, string[] calldata capabilities, string calldata agentURI ) external returns (uint256 agentId) { agentId = _nextAgentId++; _mint(msg.sender, agentId); // <-- ERC-721 mint _setTokenURI(agentId, agentURI); // ... stores metadata emit AgentRegistered(agentId, msg.sender, agentWallet, name); }"
          - paragraph [ref=e251]:
            - text: The token ID is auto-incrementing from 0. Your
            - code [ref=e252]: "`agentId`"
            - text: is unique and permanent.
          - separator [ref=e253]
          - heading "Template note" [level=2] [ref=e254]
          - blockquote [ref=e255]:
            - paragraph [ref=e256]:
              - strong [ref=e257]: "Why this matters:"
              - text: Once registered, your
              - code [ref=e258]: "`agentId`"
              - text: is the identity anchor for everything your agent does, capital allocation, risk validation, EIP-712 checkpoint signing, and on-chain attestations. This is how agents build verifiable on-chain reputation over time. Swapping your strategy never touches this layer.
          - separator [ref=e259]
          - 'heading "Part 3: Connecting to Kraken CLI" [level=2] [ref=e260]'
          - heading "Why the CLI, not raw REST?" [level=2] [ref=e261]
          - paragraph [ref=e262]: "When building an AI trading agent, you want your code to stay focused on strategy and decision-making: not exchange plumbing. The Kraken CLI handles all of that automatically:"
          - list [ref=e263]:
            - listitem [ref=e264]: Cryptographic nonce management (no clock drift issues)
            - listitem [ref=e265]: HMAC-SHA512 request signing (no manual auth code)
            - listitem [ref=e266]: Rate-limit retries (no 429 handling needed)
            - listitem [ref=e267]:
              - text: Built-in paper trading sandbox (
              - code [ref=e268]: "`--sandbox`"
              - text: flag)
            - listitem [ref=e269]:
              - strong [ref=e270]: Built-in MCP server
              - text: ": exposes Kraken as structured tools for AI agents"
          - separator [ref=e271]
          - heading "Installing the Kraken CLI" [level=2] [ref=e272]
          - code [ref=e274]: "# install script (Linux/macOS) curl --proto '=https' --tlsv1.2 -LsSf https://github.com/krakenfx/kraken-cli/releases/latest/download/kraken-cli-installer.sh | sh # check out the version kraken --version"
          - paragraph [ref=e275]:
            - text: Add to your
            - code [ref=e276]: "`.env`"
            - text: ":"
          - code [ref=e278]: "KRAKEN_API_KEY=your_api_key KRAKEN_API_SECRET=your_api_secret KRAKEN_SANDBOX=true # start with sandbox! KRAKEN_CLI_PATH=kraken # only needed if binary isn't on PATH"
          - separator [ref=e279]
          - heading "Getting Kraken API keys" [level=2] [ref=e280]
          - list [ref=e281]:
            - listitem [ref=e282]:
              - text: Log into
              - link "kraken.com" [ref=e283] [cursor=pointer]:
                - /url: https://kraken.com
              - text: → choose
              - strong [ref=e284]: Kraken Pro
              - text: (Advanced trading)
            - listitem [ref=e285]:
              - text: Go to
              - strong [ref=e286]: Settings → API
              - text: and create a new key
            - listitem [ref=e287]: "Tick exactly these permissions:"
          - paragraph [ref=e288]:
            - strong [ref=e289]: Funds permissions
          - list [ref=e290]:
            - listitem [ref=e291]:
              - text: ✅ Query — required for
              - code [ref=e292]: "`getBalance()`"
          - paragraph [ref=e293]:
            - strong [ref=e294]: Orders and trades
          - list [ref=e295]:
            - listitem [ref=e296]:
              - text: ✅ Query open orders & trades — required for
              - code [ref=e297]: "`getOpenOrders()`"
            - listitem [ref=e298]:
              - text: ✅ Create & modify orders — required for
              - code [ref=e299]: "`placeOrder()`"
            - listitem [ref=e300]: ✅ Cancel & close orders — required if the agent needs to cancel orders
          - paragraph [ref=e301]: Leave everything else unchecked (no Deposit, Withdraw, Earn, Data, or WebSocket).
          - list [ref=e302]:
            - listitem [ref=e303]:
              - text: Copy the key + secret into
              - code [ref=e304]: "`.env`"
          - separator [ref=e305]
          - heading "Using the CLI directly" [level=2] [ref=e306]
          - paragraph [ref=e307]: "The CLI is useful to verify your setup before running the agent:"
          - code [ref=e309]: "# Check ticker (no auth needed) kraken --json ticker --pair XBTUSD # Check balance (requires API key) kraken --json --api-key $KRAKEN_API_KEY --api-secret $KRAKEN_API_SECRET balance # Paper trade (sandbox mode) kraken --sandbox --json --api-key $KRAKEN_API_KEY --api-secret $KRAKEN_API_SECRET \\ order add --pair XBTUSD --type buy --ordertype market --volume 0.001"
          - separator [ref=e310]
          - heading "How the TypeScript client wraps the CLI" [level=2] [ref=e311]
          - paragraph [ref=e312]:
            - 'link "`src/exchange/kraken.ts` L64–L87" [ref=e313] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/exchange/kraken.ts#L64-L87
              - code [ref=e314]: "`src/exchange/kraken.ts`"
              - text: L64–L87
            - text: "spawns the CLI as a subprocess:"
          - code [ref=e316]: "private async run(subcommand: string[], isPrivate = false): Promise<unknown> { const args: string[] = []; if (isPrivate && !this.sandbox) { args.push(\"--api-key\", this.apiKey, \"--api-secret\", this.apiSecret); } args.push(...subcommand); args.push(\"-o\", \"json\"); const { stdout } = await execFileAsync(KRAKEN_BIN, args, { timeout: 15000 }); return JSON.parse(stdout.trim()); }"
          - paragraph [ref=e317]: "All three public methods use this:"
