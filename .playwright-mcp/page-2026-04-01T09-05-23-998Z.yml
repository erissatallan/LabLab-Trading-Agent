        - generic [ref=e81]:
          - 'img "Building AI Trading Agents with On-Chain Identity: A Complete Guide" [ref=e83]'
          - 'heading "Part 1: What Is ERC-8004 and Why Does It Matter?" [level=2] [ref=e84]'
          - 'heading "The problem: your AI agent is a ghost" [level=2] [ref=e85]'
          - paragraph [ref=e86]: You build a trading bot. It runs, it trades, it makes decisions. But from the blockchain's perspective, it doesn't exist. There's just a wallet address, no identity, no record of what the agent is, who operates it, or what it's supposed to do.
          - paragraph [ref=e87]: "This creates real problems:"
          - list [ref=e88]:
            - listitem [ref=e89]:
              - strong [ref=e90]: No accountability
              - text: ": anyone can claim any wallet address is their \"AI agent\""
            - listitem [ref=e91]:
              - strong [ref=e92]: No discoverability
              - text: ": other contracts can't verify they're talking to an authorized agent"
            - listitem [ref=e93]:
              - strong [ref=e94]: No reputation
              - text: ": the agent builds no on-chain history that others can trust"
          - paragraph [ref=e95]: ERC-8004 solves this.
          - separator [ref=e96]
          - heading "What ERC-8004 is" [level=2] [ref=e97]
          - paragraph [ref=e98]:
            - text: ERC-8004 is a standard for
            - strong [ref=e99]: AI Agent Identity Registry
            - text: on Ethereum. It defines a registry contract where agents can be registered with structured metadata, and every registration produces a unique, verifiable
            - code [ref=e100]: "`agentId`"
            - text: .
          - paragraph [ref=e101]: Think of it like ENS (Ethereum Name Service), but for AI agents instead of human-readable names.
          - heading "What gets stored on-chain" [level=3] [ref=e102]
          - paragraph [ref=e103]:
            - text: From
            - 'link "`contracts/AgentRegistry.sol` L33–L41" [ref=e104] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/contracts/AgentRegistry.sol#L33-L41
              - code [ref=e105]: "`contracts/AgentRegistry.sol`"
              - text: L33–L41
            - text: ":"
          - code [ref=e107]: "struct AgentRegistration { address operatorWallet; // Owns the ERC-721 token, pays gas address agentWallet; // Hot wallet the agent uses for signing string name; string description; string[] capabilities; // e.g. [\"trading\", \"analysis\", \"eip712-signing\"] uint256 registeredAt; bool active; }"
          - 'heading "What you get back: `agentId`" [level=3] [ref=e108]':
            - text: "What you get back:"
            - code [ref=e109]: "`agentId`"
          - paragraph [ref=e110]:
            - text: When you call
            - code [ref=e111]: "`register()`"
            - text: ", the contract mints an ERC-721 token and returns its ID:"
          - code [ref=e113]: agentId = _nextAgentId++; // auto-incrementing uint256 _mint(msg.sender, agentId); // ERC-721 mint — you own this token
          - paragraph [ref=e114]:
            - text: This
            - code [ref=e115]: "`agentId`"
            - text: (the ERC-721 token ID) becomes the agent's
            - strong [ref=e116]: persistent on-chain identity
            - text: "— used for:"
          - list [ref=e117]:
            - listitem [ref=e118]: Capital allocation in the agent Vault
            - listitem [ref=e119]: Risk validation in the Risk Router
            - listitem [ref=e120]: Cryptographic signing in EIP-712 checkpoints
          - separator [ref=e121]
