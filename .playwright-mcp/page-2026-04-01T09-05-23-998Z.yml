              - text: ": aggregate checkpoint history to score agents by decision quality"
            - listitem [ref=e649]:
              - strong [ref=e650]: Dispute resolution
              - text: ": if someone claims the agent made a bad decision, the signed checkpoint is the ground truth"
            - listitem [ref=e651]:
              - strong [ref=e652]: Compliance
              - text: ": verifiable audit trail that specific reasoning led to specific trades"
          - separator [ref=e653]
          - heading "Template note" [level=2] [ref=e654]
          - blockquote [ref=e655]:
            - paragraph [ref=e656]:
              - strong [ref=e657]: "Why this matters:"
              - text: Checkpoint generation is automatic, the agent loop calls
              - code [ref=e658]: "`generateCheckpoint()`"
              - text: after every decision, including HOLDs. Every action your agent takes is cryptographically signed and tied to its registered
              - code [ref=e659]: "`agentId`"
              - text: ". This is the foundation for building on-chain reputation: a verifiable, tamper-proof history of decisions that anyone can audit."
