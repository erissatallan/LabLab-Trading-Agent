          - 'heading "Part 4: The Vault, Risk Router, and TradeIntent Pattern" [level=2] [ref=e358]'
          - heading "The full flow" [level=2] [ref=e359]
          - code [ref=e361]: "Strategy decision (TradeDecision) ↓ Build TradeIntent struct ↓ Sign with EIP-712 (agentWallet) ↓ RiskRouter.submitTradeIntent(intent, signature) ├── verifies EIP-712 signature → agentWallet in AgentRegistry ├── checks nonce (replay protection) ├── checks deadline ├── validates risk params (position size, trade frequency) ├── emits TradeApproved or TradeRejected on-chain ↓ (if approved) Kraken CLI: placeOrder() ↓ Vault tracks capital"
          - paragraph [ref=e362]: Every step is on-chain. Every approval and rejection is a permanent event.
          - separator [ref=e363]
          - heading "The TradeIntent struct" [level=2] [ref=e364]
          - paragraph [ref=e365]:
            - text: Instead of the agent directly calling Kraken, it first constructs a
            - strong [ref=e366]: signed intent
            - text: ": a commitment to a specific trade that's been cryptographically authorized ("
            - 'link "`contracts/RiskRouter.sol` L35–L44" [ref=e367] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/contracts/RiskRouter.sol#L35-L44
              - code [ref=e368]: "`contracts/RiskRouter.sol`"
              - text: L35–L44
            - text: "):"
          - code [ref=e370]: "struct TradeIntent { uint256 agentId; address agentWallet; // must match AgentRegistry string pair; // e.g. \"XBTUSD\" string action; // \"BUY\" or \"SELL\" uint256 amountUsdScaled; // USD * 100 (e.g. 50000 = $500) uint256 maxSlippageBps; // max acceptable slippage uint256 nonce; // replay protection uint256 deadline; // Unix timestamp }"
          - paragraph [ref=e371]: The nonce increments with each approved intent, so an old signature can't be replayed.
          - separator [ref=e372]
          - heading "Building and signing a TradeIntent (TypeScript)" [level=2] [ref=e373]
          - paragraph [ref=e374]:
            - 'link "`src/onchain/riskRouter.ts` L72–L145" [ref=e375] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/onchain/riskRouter.ts#L72-L145
              - code [ref=e376]: "`src/onchain/riskRouter.ts`"
              - text: L72–L145
            - text: "handles this:"
          - code [ref=e378]: "const riskRouter = new RiskRouterClient(routerAddress, agentWallet, SEPOLIA_CHAIN_ID); // 1. Build intent (fetches current nonce from chain) const intent = await riskRouter.buildIntent( agentId, agentWallet.address, \"XBTUSD\", \"BUY\", 100, // $100 USD { maxSlippageBps: 50, deadlineSeconds: 300 } ); // 2. Sign with EIP-712 (agentWallet is the hot signing key) const signed = await riskRouter.signIntent(intent, agentWallet); // 3. Submit to RiskRouter const result = await riskRouter.submitIntent(signed); if (result.approved) { console.log(\"Trade approved — intentHash:\", result.intentHash); } else { console.warn(\"Trade rejected:\", result.reason); }"
          - paragraph [ref=e379]:
            - text: The
            - code [ref=e380]: "`intentHash`"
            - text: is carried into the EIP-712 checkpoint, linking the checkpoint to the specific approved intent.
          - separator [ref=e381]
          - heading "What the RiskRouter checks" [level=2] [ref=e382]
          - code [ref=e384]: 1. deadline — is the intent still valid? 2. nonce — does it match the stored nonce (not replayed)? 3. signature — does it recover to the registered agentWallet? 4. position size — is amountUsdScaled ≤ maxPositionSize? 5. trade frequency — are we within maxTradesPerHour?
          - paragraph [ref=e385]: "Each check emits an event on Sepolia if it fails:"
          - code [ref=e387]: TradeRejected(agentId, intentHash, "Exceeds maxPositionSize") TradeRejected(agentId, intentHash, "Intent expired")
          - paragraph [ref=e388]: "If all checks pass:"
          - code [ref=e390]: TradeApproved(agentId, intentHash, amountUsdScaled)
          - separator [ref=e391]
          - heading "Setting your risk params" [level=2] [ref=e392]
          - paragraph [ref=e393]:
            - text: "You don't need to do this manually:"
            - code [ref=e394]: "`npm run register`"
            - text: already sets default risk params as part of registration (
            - 'link "`scripts/register-agent.ts` L76–L83" [ref=e395] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/scripts/register-agent.ts#L76-L83
              - code [ref=e396]: "`scripts/register-agent.ts`"
              - text: L76–L83
            - text: "):"
          - code [ref=e398]: "// Called automatically during npm run register await router.setRiskParams( agentId, BigInt(50000), // maxPositionUsdScaled: $500 max per trade (500 * 100) BigInt(500), // maxDrawdownBps: 5% BigInt(10) // maxTradesPerHour: 10 );"
          - paragraph [ref=e399]:
            - text: To change them later, use
            - 'link "`src/onchain/riskRouter.ts` L183–L196" [ref=e400] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/onchain/riskRouter.ts#L183-L196
              - code [ref=e401]: "`src/onchain/riskRouter.ts`"
              - text: L183–L196
            - text: ":"
          - code [ref=e403]: "await riskRouter.setRiskParams( agentId, 500, // maxPositionUsd: $500 per trade 500, // maxDrawdownBps: 5% 10 // maxTradesPerHour );"
