          - heading "Template note" [level=2] [ref=e573]
          - blockquote [ref=e574]:
            - paragraph [ref=e575]:
              - strong [ref=e576]: "Why this matters:"
              - text: The explanation layer is already wired into the agent loop, you don't need to call it manually. Your strategy's
              - code [ref=e577]: "`reasoning`"
              - text: field is the only input required. The stronger and more specific your reasoning strings, the more useful your agent's audit trail becomes — for debugging, for trust, and for building reputation over time.
          - separator [ref=e578]
          - 'heading "Part 6: EIP-712 Signed Checkpoints" [level=2] [ref=e579]'
          - heading "What problem this solves" [level=2] [ref=e580]
          - paragraph [ref=e581]: "Your agent writes \"I bought BTC because the momentum was strong\" to a log file. But a log file is just text, anyone could edit it. How do you prove that:"
          - list [ref=e582]:
            - listitem [ref=e583]: A specific agent made a specific decision
            - listitem [ref=e584]: At a specific time
            - listitem [ref=e585]: With a specific piece of reasoning
            - listitem [ref=e586]: And that nothing was tampered with afterward?
          - paragraph [ref=e587]:
            - strong [ref=e588]: EIP-712 signatures
            - text: solve this. Every trade decision is cryptographically signed by the agent's private key over structured data that includes all of the above.
          - separator [ref=e589]
          - heading "What EIP-712 is" [level=2] [ref=e590]
          - paragraph [ref=e591]:
            - text: EIP-712 is the Ethereum standard for signing
            - strong [ref=e592]: typed structured data
            - text: (as opposed to raw bytes). It produces human-readable signing prompts in wallets and prevents signature replay attacks across different contracts and chains.
          - paragraph [ref=e593]: "A signature under EIP-712 proves:"
          - list [ref=e594]:
            - listitem [ref=e595]: The signer held the private key at signing time
            - listitem [ref=e596]: The signed data has not been modified
            - listitem [ref=e597]: The signature was intended for this specific contract + chain (via the domain separator)
          - separator [ref=e598]
          - heading "The checkpoint schema" [level=2] [ref=e599]
          - paragraph [ref=e600]:
            - 'link "`src/explainability/checkpoint.ts` L28–L41" [ref=e601] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/explainability/checkpoint.ts#L28-L41
              - code [ref=e602]: "`src/explainability/checkpoint.ts`"
              - text: L28–L41
            - text: "defines the typed structure:"
          - code [ref=e604]: "const domain = { name: \"AITradingAgent\", version: \"1\", chainId: 11155111, // Sepolia verifyingContract: REGISTRY_ADDRESS, }; const types = { TradeCheckpoint: [ { name: \"agentId\", type: \"uint256\" }, // ERC-721 token ID { name: \"timestamp\", type: \"uint256\" }, { name: \"action\", type: \"string\" }, { name: \"asset\", type: \"string\" }, { name: \"pair\", type: \"string\" }, { name: \"amountUsdScaled\", type: \"uint256\" }, // USD * 100 { name: \"priceUsdScaled\", type: \"uint256\" }, // USD * 100 { name: \"reasoningHash\", type: \"bytes32\" }, // keccak256(reasoning) { name: \"confidenceScaled\", type: \"uint256\" }, // confidence * 1000 { name: \"intentHash\", type: \"bytes32\" }, // hash of the approved TradeIntent ], };"
          - paragraph [ref=e605]:
            - text: Why
            - code [ref=e606]: "`reasoningHash`"
            - text: instead of the full reasoning string?
          - list [ref=e607]:
            - listitem [ref=e608]:
              - text: "Strings can be arbitrarily long: hashing keeps the signed payload compact ("
              - 'link "`checkpoint.ts` L69" [ref=e609] [cursor=pointer]':
                - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/explainability/checkpoint.ts#L69
                - code [ref=e610]: "`checkpoint.ts`"
                - text: L69
              - text: )
            - listitem [ref=e611]:
              - text: "The hash is a commitment: if you have the hash and the original string, you can verify they match ("
              - 'link "`verifyReasoningIntegrity()`" [ref=e612] [cursor=pointer]':
                - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/explainability/checkpoint.ts#L145
                - code [ref=e613]: "`verifyReasoningIntegrity()`"
              - text: )
            - listitem [ref=e614]:
              - text: The full reasoning string is stored alongside the checkpoint in
              - code [ref=e615]: "`checkpoints.jsonl`"
              - text: (
              - 'link "`index.ts` L193" [ref=e616] [cursor=pointer]':
                - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/agent/index.ts#L193
                - code [ref=e617]: "`index.ts`"
                - text: L193
              - text: )
          - separator [ref=e618]
          - heading "Generating a checkpoint" [level=2] [ref=e619]
          - paragraph [ref=e620]:
            - 'link "`src/explainability/checkpoint.ts` L59–L67" [ref=e621] [cursor=pointer]':
              - /url: https://github.com/Stephen-Kimoi/ai-trading-agent-template/blob/main/src/explainability/checkpoint.ts#L59-L67
              - code [ref=e622]: "`src/explainability/checkpoint.ts`"
              - text: L59–L67
            - text: ":"
          - code [ref=e624]: "import { generateCheckpoint } from \"./src/explainability/checkpoint.js\"; const checkpoint = await generateCheckpoint( agentId, // uint256 ERC-721 token ID decision, // TradeDecision from your strategy market, // MarketData at decision time signer, // ethers.Wallet — the agent's signing key registryAddress, // AgentRegistry address (for domain separator) 11155111 // Sepolia chain ID ); // checkpoint.signature = \"0x1a2b3c...\" // checkpoint.signerAddress = \"0xYourWalletAddress\" // checkpoint.reasoningHash = keccak256(decision.reasoning)"
          - paragraph [ref=e625]:
            - text: Internally this calls
            - code [ref=e626]: "`wallet.signTypedData(domain, types, value)`"
            - text: ": ethers.js v6's EIP-712 signing method."
          - separator [ref=e627]
          - heading "Verifying a checkpoint" [level=2] [ref=e628]
          - paragraph [ref=e629]: "Anyone can verify a checkpoint without trusting any intermediary:"
          - code [ref=e631]: "import { verifyCheckpoint, verifyReasoningIntegrity } from \"./src/explainability/checkpoint.js\"; // 1. Verify the signature recovers to the expected signer const sigValid = verifyCheckpoint( checkpoint, registryAddress, 11155111, expectedSignerAddress ); console.log(`Signature valid: ${sigValid}`); // true // 2. Verify the reasoning string wasn't tampered with const reasoningValid = verifyReasoningIntegrity(checkpoint); console.log(`Reasoning hash matches: ${reasoningValid}`); // true"
          - paragraph [ref=e632]:
            - text: Under the hood this uses
            - code [ref=e633]: "`ethers.verifyTypedData()`"
            - text: ":"
          - code [ref=e635]: const recovered = ethers.verifyTypedData(domain, CHECKPOINT_TYPES, value, checkpoint.signature); return recovered.toLowerCase() === expectedSigner.toLowerCase();
          - separator [ref=e636]
          - heading "Reading checkpoints from checkpoints.jsonl" [level=2] [ref=e637]
          - code [ref=e639]: "import * as fs from \"fs\"; import { verifyCheckpoint } from \"./src/explainability/checkpoint.js\"; const lines = fs.readFileSync(\"checkpoints.jsonl\", \"utf8\").trim().split(\"\\n\"); const checkpoints = lines.map(l => JSON.parse(l)); for (const cp of checkpoints) { const valid = verifyCheckpoint(cp, registryAddress, 11155111, expectedSigner); console.log(`${new Date(cp.timestamp * 1000).toISOString()} | ${cp.action} ${cp.pair} | valid: ${valid}`); }"
          - separator [ref=e640]
          - heading "What you can build on top of this" [level=2] [ref=e641]
          - paragraph [ref=e642]: "The signed checkpoint format is a foundation. With it you can:"
          - list [ref=e643]:
            - listitem [ref=e644]:
